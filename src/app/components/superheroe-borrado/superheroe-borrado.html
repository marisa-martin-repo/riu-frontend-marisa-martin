<h2 mat-dialog-title>Eliminar superheroe</h2>
<mat-dialog-content>
    ¿Querés eliminar el superhéroe {{ id() }}?
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton mat-dialog-close>No</button>
  <button matButton mat-dialog-close [mat-dialog-close]="id()" cdkFocusInitial>Sí</button>
</mat-dialog-actions>
