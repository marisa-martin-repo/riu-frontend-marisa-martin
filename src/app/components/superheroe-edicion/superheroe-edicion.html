<h2 mat-dialog-title>{{ dataSuperheroe().nombre !="" ? 'Editar' : 'Añadir' }} superhéroe</h2>
<mat-dialog-content>
    ¿Querés editar/añadir el superhéroe {{ dataSuperheroe().nombre}}?
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton mat-dialog-close>Cancelar</button>
  <button matButton mat-dialog-close [mat-dialog-close]="dataSuperheroe()" cdkFocusInitial>Aceptar</button>
</mat-dialog-actions>
