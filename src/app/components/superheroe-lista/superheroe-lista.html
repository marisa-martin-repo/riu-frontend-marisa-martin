
<div class="mat-elevation-z8">
  <div class="search-container">
    <div class="search-text">
      <mat-form-field>
        <mat-label>Buscar superhéroe</mat-label>
        <input matInput type="text" [(ngModel)]="valorBuscado">
        @if (valorBuscado) {
          <button matSuffix matIconButton aria-label="Borrar" (click)="limpiar()">
            <mat-icon>close</mat-icon>
          </button>
        }
      </mat-form-field>
    </div>
    <div class="search-button">
      <button matMiniFab (click)="buscar()">
        <mat-icon>search</mat-icon>
      </button>
      <button matMiniFab (click)="editar(itemVacio)">
        <mat-icon>add</mat-icon>
      </button>
      </div>
  </div>
</div>

<div class="mat-elevation-z8">
  <table mat-table [dataSource]="dataSource">

    <!-- Id -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> Id </th>
      <td mat-cell *matCellDef="let item"> {{item.id}} </td>
    </ng-container>

    <!-- Nombre -->
    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef> Nombre </th>
      <td mat-cell *matCellDef="let item"> {{item.nombre}} </td>
    </ng-container>

    <!-- Contacto -->
    <ng-container matColumnDef="contacto">
      <th mat-header-cell *matHeaderCellDef> Contacto </th>
      <td mat-cell *matCellDef="let item"> {{item.contacto}} </td>
    </ng-container>

    <!-- Descripción -->
    <ng-container matColumnDef="descripcion">
      <th mat-header-cell *matHeaderCellDef> Descripción </th>
      <td mat-cell *matCellDef="let item"> {{item.descripcion}} </td>
    </ng-container>

    <!-- Superpoder -->
    <ng-container matColumnDef="superpoder">
      <th mat-header-cell *matHeaderCellDef> Superpoder </th>
      <td mat-cell *matCellDef="let item"> {{item.superpoder}} </td>
    </ng-container>

    <ng-container matColumnDef="operacion">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let item">
        <div class="flex-container">
          <button matMiniFab (click)="editar(item)">
            <mat-icon>edit</mat-icon>
          </button>
          <button matMiniFab (click)="borrar((item.id))">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columnaTabla"></tr>
    <tr mat-row *matRowDef="let row; columns: columnaTabla;"></tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 15]"
                 showFirstLastButtons
                 aria-label="Elegí superhéroes para ver por página">
  </mat-paginator>
</div>
