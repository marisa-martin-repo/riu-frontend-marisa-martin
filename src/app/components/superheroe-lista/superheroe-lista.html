
<div class="mat-elevation-z8">
  <div class="search-container">
    <div class="search-text">
      <mat-form-field>
        <mat-label>Buscar superhéroe</mat-label>
        <input matInput type="text" [(ngModel)]="valorBuscado">
        @if (valorBuscado) {
          <button matSuffix matIconButton aria-label="Borrar" (click)="borrar()">
            <mat-icon>close</mat-icon>
          </button>
        }
      </mat-form-field>
    </div>
    <div class="search-button">
      <button matMiniFab (click)="buscar()">
        <mat-icon>search</mat-icon>
      </button>
      <button matMiniFab (click)="agregar()">
        <mat-icon>add</mat-icon>
      </button>
      </div>
  </div>
</div>

<div class="mat-elevation-z8">
  <table mat-table [dataSource]="dataSource">

    <!-- Position Column -->
    <ng-container matColumnDef="position">
      <th mat-header-cell *matHeaderCellDef> No. </th>
      <td mat-cell *matCellDef="let element"> {{element.position}} </td>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Name </th>
      <td mat-cell *matCellDef="let element"> {{element.name}} </td>
    </ng-container>

    <!-- Weight Column -->
    <ng-container matColumnDef="weight">
      <th mat-header-cell *matHeaderCellDef> Weight </th>
      <td mat-cell *matCellDef="let element"> {{element.weight}} </td>
    </ng-container>

    <!-- Symbol Column -->
    <ng-container matColumnDef="symbol">
      <th mat-header-cell *matHeaderCellDef> Symbol </th>
      <td mat-cell *matCellDef="let element"> {{element.symbol}} </td>
    </ng-container>

    <ng-container matColumnDef="operation">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let element">
        <div class="flex-container">
          <button matMiniFab (click)="modificar(element.position)">
            <mat-icon>edit</mat-icon>
          </button>
          <button matMiniFab (click)="eliminar((element.position))">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 15]"
                 showFirstLastButtons
                 aria-label="Elegí superhéroes para ver por página">
  </mat-paginator>
</div>
